name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is what the Pi actually runs; 3.12 is the recent mainstream
        # target. Both are listed in pyproject as supported via requires-python.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Tests
        # ffmpeg / sherpa-onnx / whisper-server / llama-server are all mocked
        # in the suite — no GPU, no backends, no system deps required.
        run: uv run pytest -q
